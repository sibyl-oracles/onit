x-onit-hardening: &onit-hardening
  read_only: true
  cap_drop: [ALL]
  # Make host.docker.internal resolve on Linux, so ONIT_HOST can point at a
  # vLLM server running on the same machine (localhost inside a container is
  # the container itself).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  # tmpfs pages are RAM-backed and count against this limit.
  mem_limit: 4g
  # Read-only rootfs: every writable path is an ephemeral RAM-backed tmpfs,
  # except /home/onit/data which is a host bind mount (see x-data-volume) so
  # agent files survive restarts. Session transcripts that must persist are
  # mounted as named volumes per service (nested inside the /home/onit/.onit
  # tmpfs).
  tmpfs:
    - /tmp:size=64m
    - /home/onit/.cache:size=64m
    - /home/onit/.onit:size=64m

# Agent working directory (data_path) on a permanent filesystem. Point
# ONIT_DATA_DIR at a host folder on persistent storage (e.g. an SSD mount).
x-data-volume: &data-volume ${ONIT_DATA_DIR:-/data/sandbox}:/home/onit/data

# Read-only corpus for the local_search tool. Point ONIT_DOCUMENTS_DIR at the
# host folder holding your documents (absolute path — ~ is not expanded). The
# search index itself is written under the data volume, so :ro is safe.
x-documents-volume: &documents-volume ${ONIT_DOCUMENTS_DIR:-/data/documents}:/home/onit/documents:ro

# Tells the local_search MCP server (running inside each service) where the
# mounted corpus lives; equivalent to `export ONIT_DOCUMENTS_PATH=...` in a
# bare-metal install.
x-documents-env: &documents-env
  ONIT_DOCUMENTS_PATH: /home/onit/documents

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # TLS termination and automatic Let's Encrypt certificates. Set ONIT_DOMAIN
  # in .env (e.g. mychat.ai); with the default "localhost" Caddy serves a
  # self-signed certificate for local testing.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ONIT_DOMAIN: ${ONIT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates and ACME account keys — must persist across restarts or
      # Caddy re-requests certs and hits Let's Encrypt rate limits.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - onit-web

  # Each service runs its own MCP servers in-process (`onit serve <mode>`
  # starts them automatically); they stay private to the container's network
  # namespace and are never published.
  onit-web:
    build: .
    <<: [*onit-hardening, *gpu]
    restart: unless-stopped
    ports:
      # Loopback only: public traffic must come through Caddy (TLS), and
      # uvicorn trusts X-Forwarded-* headers so it must not be reachable
      # directly from outside the host.
      - "127.0.0.1:9000:9000"
    env_file: .env
    environment: *documents-env
    volumes:
      - web-sessions:/home/onit/.onit/sessions
      - *data-volume
      - *documents-volume
    command: ["--data-path", "/home/onit/data", "serve", "web", "--port", "9000"]

  onit-a2a:
    build: .
    <<: [*onit-hardening, *gpu]
    restart: unless-stopped
    ports:
      - "9001:9001"
    env_file: .env
    environment: *documents-env
    volumes:
      - a2a-sessions:/home/onit/.onit/sessions
      - *data-volume
      - *documents-volume
    command: ["--data-path", "/home/onit/data", "serve", "a2a", "--port", "9001"]

  onit-gateway:
    build: .
    <<: [*onit-hardening, *gpu]
    restart: unless-stopped
    env_file: .env
    environment: *documents-env
    volumes:
      - gateway-sessions:/home/onit/.onit/sessions
      - *data-volume
      - *documents-volume
    command: ["--data-path", "/home/onit/data", "serve", "gateway"]

  onit-terminal:
    build: .
    <<: [*onit-hardening, *gpu]
    env_file: .env
    stdin_open: true
    tty: true
    environment: *documents-env
    volumes:
      - terminal-sessions:/home/onit/.onit/sessions
      - *data-volume
      - *documents-volume
    profiles: ["terminal"]
    command: ["--data-path", "/home/onit/data"]

volumes:
  web-sessions:
  a2a-sessions:
  gateway-sessions:
  terminal-sessions:
  caddy-data:
  caddy-config:
