x-onit-hardening: &onit-hardening
  read_only: true
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  pids_limit: 256
  # tmpfs pages are RAM-backed and count against this limit — sized to leave
  # ~2.5g of headroom for processes with the data tmpfs at its 1g cap.
  mem_limit: 4g
  # Read-only rootfs: every writable path is an ephemeral RAM-backed tmpfs.
  # Session transcripts that must persist are mounted as named volumes per
  # service (nested inside the /home/onit/.onit tmpfs).
  tmpfs:
    - /tmp:size=64m
    - /home/onit/.cache:size=64m
    - /home/onit/.onit:size=64m
    - /home/onit/data:size=1g

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  onit-mcp:
    build: .
    <<: [*onit-hardening, *gpu]
    ports:
      - "18200:18200"
      - "18201:18201"
      - "18202:18202"
      - "18203:18203"
      - "18204:18204"
    env_file: .env
    command: ["--mcp"]

  onit-web:
    build: .
    <<: [*onit-hardening, *gpu]
    ports:
      - "9000:9000"
    env_file: .env
    depends_on:
      - onit-mcp
    volumes:
      - web-sessions:/home/onit/.onit/sessions
    command: ["--web", "--web-port", "9000", "--mcp-host", "onit-mcp"]

  onit-a2a:
    build: .
    <<: [*onit-hardening, *gpu]
    ports:
      - "9001:9001"
    env_file: .env
    depends_on:
      - onit-mcp
    volumes:
      - a2a-sessions:/home/onit/.onit/sessions
    command: ["--a2a", "--a2a-port", "9001", "--mcp-host", "onit-mcp"]

  onit-gateway:
    build: .
    <<: [*onit-hardening, *gpu]
    env_file: .env
    depends_on:
      - onit-mcp
    volumes:
      - gateway-sessions:/home/onit/.onit/sessions
    command: ["--gateway", "--mcp-host", "onit-mcp"]

  onit-terminal:
    build: .
    <<: [*onit-hardening, *gpu]
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - terminal-sessions:/home/onit/.onit/sessions
    profiles: ["terminal"]
    command: []

volumes:
  web-sessions:
  a2a-sessions:
  gateway-sessions:
  terminal-sessions:
